name: SALES_DATA_SEMANTIC_VIEW
description: 'Sales analytics model for bike and snow sports products. Covers revenue,
  quantity, transactions, and customer metrics across all product categories (Bike,
  Skis, Ski Boots). Supports time-series analysis by date, product-level breakdown
  by category/brand/color, customer segmentation by region/age/gender, and channel
  analysis (Online vs Partner). Key business terms: total_revenue = SUM(TOTAL_PRICE),
  units_sold = SUM(QUANTITY_SOLD), transaction_count = COUNT(SALE_ID), avg_order_value
  = AVG(TOTAL_PRICE).'
tables:
  - name: FACT_SALES
    description: 'Transactional sales data. Each row represents one sales order line.
      TOTAL_PRICE is the full transaction value. IS_RETURN=TRUE marks reversed transactions
      that should be excluded from forward-looking revenue analysis.'
    base_table:
      database: CC_COCO_SNOWFLAKE_INTELLIGENCE_E2E
      schema: PUBLIC
      table: FACT_SALES
    primary_key:
      columns:
        - SALE_ID
    dimensions:
      - name: SALE_ID
        expr: SALE_ID
        data_type: NUMBER
        description: Unique identifier for each sales transaction.
      - name: ARTICLE_ID
        expr: ARTICLE_ID
        data_type: NUMBER
        description: Foreign key to DIM_ARTICLE. Identifies the product sold.
      - name: CUSTOMER_ID
        expr: CUSTOMER_ID
        data_type: NUMBER
        description: Foreign key to DIM_CUSTOMER. Identifies the buying customer.
      - name: QUANTITY_SOLD
        expr: QUANTITY_SOLD
        data_type: NUMBER
        description: Number of units sold in this transaction.
        synonyms:
          - units sold
          - items sold
          - qty
      - name: SALES_CHANNEL
        expr: SALES_CHANNEL
        data_type: VARCHAR
        description: 'Sales channel used: ''Online'' for direct web orders, ''Partner''
          for third-party distributor orders.'
        synonyms:
          - channel
          - distribution channel
          - sales medium
        sample_values:
          - Online
          - Partner
      - name: IS_RETURN
        expr: IS_RETURN
        data_type: BOOLEAN
        description: TRUE when this is a product return / credit note. Exclude IS_RETURN=TRUE
          rows for net revenue calculations.
        synonyms:
          - return
          - refund
          - reversed
    time_dimensions:
      - name: DATE_SALES
        expr: DATE_SALES
        data_type: DATE
        description: Calendar date on which the sale was recorded.
        synonyms:
          - sale date
          - order date
          - transaction date
          - purchase date
    facts:
      - name: TOTAL_PRICE
        expr: TOTAL_PRICE
        data_type: NUMBER
        description: Total transaction value in local currency (unit price x quantity
          sold). Use SUM for revenue aggregations.
        synonyms:
          - revenue
          - sales amount
          - transaction value
          - order value

  - name: DIM_ARTICLE
    description: 'Product master data. Contains all bike and snow sports products
      sold. ARTICLE_CATEGORY groups products into: ''Bike'', ''Skis'', ''Ski Boots''.'
    base_table:
      database: CC_COCO_SNOWFLAKE_INTELLIGENCE_E2E
      schema: PUBLIC
      table: DIM_ARTICLE
    primary_key:
      columns:
        - ARTICLE_ID
    dimensions:
      - name: ARTICLE_ID
        expr: ARTICLE_ID
        data_type: NUMBER
        description: Unique product identifier.
      - name: ARTICLE_NAME
        expr: ARTICLE_NAME
        data_type: VARCHAR
        description: Full product name (e.g. "Premium Bicycle", "Carver Skis").
        synonyms:
          - product name
          - product
          - item name
        sample_values:
          - Mondracer Infant Bike
          - Premium Bicycle
          - The Ultimate Downhill Bike
          - The Xtreme Road Bike 105 SL
          - Carver Skis
          - Outpiste Skis
          - Racing Fast Skis
          - Ski Boots TDBootz Special
      - name: ARTICLE_CATEGORY
        expr: ARTICLE_CATEGORY
        data_type: VARCHAR
        description: 'Product category: ''Bike'' for bicycles, ''Skis'' for ski products,
          ''Ski Boots'' for ski footwear.'
        synonyms:
          - product category
          - category
          - product type
          - sport
        sample_values:
          - Bike
          - Skis
          - Ski Boots
      - name: ARTICLE_BRAND
        expr: ARTICLE_BRAND
        data_type: VARCHAR
        description: Brand name of the product.
        synonyms:
          - brand
          - manufacturer
          - make
        sample_values:
          - Mondracer
          - Veloci
          - Graviton
          - Xtreme
          - Carver
          - Outpiste
          - RacerX
          - TDBootz
      - name: ARTICLE_COLOR
        expr: ARTICLE_COLOR
        data_type: VARCHAR
        description: Primary colour of the product.
        synonyms:
          - color
          - colour
        sample_values:
          - Red
          - Blue
          - Green
          - White
          - Black
          - Orange
          - Yellow
    facts:
      - name: ARTICLE_PRICE
        expr: ARTICLE_PRICE
        data_type: NUMBER
        description: List price of the product in local currency (RRP - recommended retail price).
        synonyms:
          - list price
          - retail price
          - RRP
          - unit price

  - name: DIM_CUSTOMER
    description: Customer master data. Contains demographic and segmentation attributes
      for all customers.
    base_table:
      database: CC_COCO_SNOWFLAKE_INTELLIGENCE_E2E
      schema: PUBLIC
      table: DIM_CUSTOMER
    primary_key:
      columns:
        - CUSTOMER_ID
    dimensions:
      - name: CUSTOMER_ID
        expr: CUSTOMER_ID
        data_type: NUMBER
        description: Unique customer identifier.
      - name: CUSTOMER_NAME
        expr: CUSTOMER_NAME
        data_type: VARCHAR
        description: Customer display name.
        synonyms:
          - customer
          - client name
          - buyer
      - name: CUSTOMER_REGION
        expr: CUSTOMER_REGION
        data_type: VARCHAR
        description: Geographic region of the customer (North, South, East, West).
        synonyms:
          - region
          - area
          - geography
          - location
        sample_values:
          - North
          - South
          - East
          - West
      - name: CUSTOMER_AGE
        expr: CUSTOMER_AGE
        data_type: NUMBER
        description: Age of the customer in years.
        synonyms:
          - age
      - name: CUSTOMER_GENDER
        expr: CUSTOMER_GENDER
        data_type: VARCHAR
        description: Customer gender (Male / Female).
        synonyms:
          - gender
          - sex
        sample_values:
          - Male
          - Female
      - name: CUSTOMER_SEGMENT
        expr: CUSTOMER_SEGMENT
        data_type: VARCHAR
        description: 'Customer value segment: ''Premium'' for high-value customers,
          ''Regular'' for standard customers.'
        synonyms:
          - segment
          - customer tier
          - customer type
          - loyalty tier
        sample_values:
          - Premium
          - Regular

relationships:
  - name: FACT_SALES_TO_DIM_ARTICLE
    left_table: FACT_SALES
    right_table: DIM_ARTICLE
    join_type: inner
    relationship_type: many_to_one
    relationship_columns:
      - left_column: ARTICLE_ID
        right_column: ARTICLE_ID
  - name: FACT_SALES_TO_DIM_CUSTOMER
    left_table: FACT_SALES
    right_table: DIM_CUSTOMER
    join_type: inner
    relationship_type: many_to_one
    relationship_columns:
      - left_column: CUSTOMER_ID
        right_column: CUSTOMER_ID

metrics:
  - name: total_revenue
    description: Total sales revenue (sum of TOTAL_PRICE across all transactions).
      Includes returns unless explicitly filtered with IS_RETURN = FALSE.
    synonyms:
      - revenue
      - sales
      - total sales
      - gross revenue
    expr: SUM(FACT_SALES.TOTAL_PRICE)
  - name: transaction_count
    description: Total number of sales transactions.
    synonyms:
      - number of sales
      - sales count
      - orders
      - number of transactions
    expr: COUNT(FACT_SALES.SALE_ID)
  - name: units_sold
    description: Total quantity of product units sold across all transactions.
    synonyms:
      - items sold
      - quantity sold
      - volume
    expr: SUM(FACT_SALES.QUANTITY_SOLD)
  - name: unique_customers
    description: Number of distinct customers who made a purchase.
    synonyms:
      - customer count
      - buyers
      - number of customers
    expr: COUNT(DISTINCT FACT_SALES.CUSTOMER_ID)
  - name: avg_order_value
    description: Average revenue per transaction (total revenue / number of transactions).
    synonyms:
      - AOV
      - average transaction value
      - average basket size
    expr: AVG(FACT_SALES.TOTAL_PRICE)

verified_queries:
  - name: total_revenue_for_product_last_year
    question: What is the total revenue for the Carver Skis during last year?
    sql: "SELECT SUM(fs.TOTAL_PRICE) AS total_revenue, MIN(fs.DATE_SALES) AS min_date,\
      \ MAX(fs.DATE_SALES) AS max_date, COUNT(fs.SALE_ID) AS transaction_count, COUNT(DISTINCT\
      \ fs.CUSTOMER_ID) AS unique_customers FROM CC_COCO_SNOWFLAKE_INTELLIGENCE_E2E.PUBLIC.FACT_SALES\
      \ AS fs INNER JOIN CC_COCO_SNOWFLAKE_INTELLIGENCE_E2E.PUBLIC.DIM_ARTICLE AS\
      \ da ON fs.ARTICLE_ID = da.ARTICLE_ID WHERE da.ARTICLE_NAME = 'Carver Skis'\
      \ AND DATE_PART('YEAR', fs.DATE_SALES) = 2025 AND fs.DATE_SALES <= CURRENT_TIMESTAMP()"
    verified_at: 1775564717
    verified_by: Semantic Model Generator
  - name: ski_products_ranked_by_revenue
    question: What ski products have the highest and lowest sales, ranked by total revenue?
    sql: "WITH ski_products_sales AS (SELECT a.ARTICLE_NAME, a.ARTICLE_BRAND, a.ARTICLE_COLOR,\
      \ a.ARTICLE_PRICE, SUM(f.TOTAL_PRICE) AS total_revenue, SUM(f.QUANTITY_SOLD)\
      \ AS total_quantity, COUNT(f.SALE_ID) AS total_transactions FROM CC_COCO_SNOWFLAKE_INTELLIGENCE_E2E.PUBLIC.FACT_SALES\
      \ AS f INNER JOIN CC_COCO_SNOWFLAKE_INTELLIGENCE_E2E.PUBLIC.DIM_ARTICLE AS a\
      \ ON f.ARTICLE_ID = a.ARTICLE_ID WHERE a.ARTICLE_CATEGORY = 'Skis' AND f.DATE_SALES\
      \ <= CURRENT_TIMESTAMP() GROUP BY a.ARTICLE_NAME, a.ARTICLE_BRAND, a.ARTICLE_COLOR,\
      \ a.ARTICLE_PRICE), ranked_products AS (SELECT *, RANK() OVER (ORDER BY total_revenue\
      \ DESC NULLS LAST) AS revenue_rank_desc, RANK() OVER (ORDER BY total_revenue\
      \ ASC) AS revenue_rank_asc FROM ski_products_sales) SELECT article_name, article_brand,\
      \ article_color, article_price, total_revenue, total_quantity, total_transactions,\
      \ CASE WHEN revenue_rank_desc = 1 THEN 'Highest' WHEN revenue_rank_asc = 1\
      \ THEN 'Lowest' END AS performance_category FROM ranked_products WHERE revenue_rank_desc\
      \ = 1 OR revenue_rank_asc = 1 ORDER BY total_revenue DESC NULLS LAST"
    verified_at: 1775564717
    verified_by: Semantic Model Generator
  - name: revenue_by_region_and_category
    question: What is the total revenue by customer region and product category?
    sql: "SELECT dc.CUSTOMER_REGION, da.ARTICLE_CATEGORY, SUM(fs.TOTAL_PRICE) AS\
      \ total_revenue, COUNT(DISTINCT fs.CUSTOMER_ID) AS unique_customers, SUM(fs.QUANTITY_SOLD)\
      \ AS units_sold FROM CC_COCO_SNOWFLAKE_INTELLIGENCE_E2E.PUBLIC.FACT_SALES AS\
      \ fs INNER JOIN CC_COCO_SNOWFLAKE_INTELLIGENCE_E2E.PUBLIC.DIM_ARTICLE AS da\
      \ ON fs.ARTICLE_ID = da.ARTICLE_ID INNER JOIN CC_COCO_SNOWFLAKE_INTELLIGENCE_E2E.PUBLIC.DIM_CUSTOMER\
      \ AS dc ON fs.CUSTOMER_ID = dc.CUSTOMER_ID GROUP BY dc.CUSTOMER_REGION, da.ARTICLE_CATEGORY\
      \ ORDER BY total_revenue DESC"
    verified_at: 1775564717
    verified_by: Semantic Model Generator
  - name: top_products_by_revenue_excl_returns
    question: What are the top performing products by total revenue excluding returns?
    sql: "SELECT da.ARTICLE_NAME, da.ARTICLE_CATEGORY, da.ARTICLE_BRAND, SUM(fs.TOTAL_PRICE)\
      \ AS total_revenue, SUM(fs.QUANTITY_SOLD) AS total_units, COUNT(DISTINCT fs.CUSTOMER_ID)\
      \ AS unique_customers, AVG(fs.TOTAL_PRICE / NULLIF(fs.QUANTITY_SOLD, 0)) AS\
      \ avg_unit_price FROM CC_COCO_SNOWFLAKE_INTELLIGENCE_E2E.PUBLIC.FACT_SALES AS\
      \ fs INNER JOIN CC_COCO_SNOWFLAKE_INTELLIGENCE_E2E.PUBLIC.DIM_ARTICLE AS da\
      \ ON fs.ARTICLE_ID = da.ARTICLE_ID WHERE fs.IS_RETURN = FALSE GROUP BY da.ARTICLE_NAME,\
      \ da.ARTICLE_CATEGORY, da.ARTICLE_BRAND ORDER BY total_revenue DESC"
    verified_at: 1775564717
    verified_by: Semantic Model Generator
